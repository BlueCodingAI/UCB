# Reverse proxy for the Disha CAP platform (no domain — IP only, HTTP).
# Copy to /etc/nginx/sites-available/ucb and symlink into sites-enabled.
# Single entry point on port 80:  http://<VPS_IP>
server {
    listen 80;
    listen [::]:80;
    server_name _;            # match any host / the server's IP

    client_max_body_size 25m; # KB document uploads cap at 25 MB (multer)

    # API → Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files (banner images, etc.) → backend static
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    # Health probes (optional)
    location = /healthz { proxy_pass http://127.0.0.1:4000; }
    location = /readyz  { proxy_pass http://127.0.0.1:4000; }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
